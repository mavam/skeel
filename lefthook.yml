pre-push:
  parallel: true
  commands:
    ruff-check:
      run: uv run ruff check
    ruff-format:
      run: uv run ruff format --check
    changelog-validate:
      run: uvx tenzir-ship validate
    actionlint:
      run: if command -v actionlint >/dev/null; then actionlint; fi

fix:
  parallel: false
  commands:
    ruff-check:
      run: uv run ruff check --fix
    ruff-format:
      run: uv run ruff format
