name: Release

on:
  workflow_dispatch:
    inputs:
      intro:
        description: |
          Intro of the release

          The intro should be 1-2 sentences long, must be written in active
          voice, and should clearly communicate the theme of the release to the
          user. Use full sentences and avoid abbreviations.
        required: true
        type: string
      title:
        description: |
          User-facing release title (auto-generated if omitted)
        required: false
        type: string

jobs:
  release:
    name: Create GitHub release
    permissions:
      contents: write
    uses: tenzir/ship/.github/workflows/release.yaml@main
    with:
      intro: ${{ inputs.intro }}
      title: ${{ inputs.title }}
      git-add-paths: pyproject.toml uv.lock
      pre-create: |
        uv sync --python 3.14 --dev
        uv run ruff check
        uv run ruff format --check
        uv run mypy
        uv run pytest --durations=10
        uv build
      post-create: |
        uv lock

  publish:
    name: Publish package to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/skeel

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.release.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
